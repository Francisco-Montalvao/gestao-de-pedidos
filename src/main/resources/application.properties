spring.datasource.url=jdbc:postgresql://localhost:5432/gestao_de_pedidos
spring.datasource.username=montalvao
spring.datasource.password=


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true



spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true



# Aplica as quebras de linha e indentação na query
spring.jpa.properties.hibernate.format_sql=true

# Aplica cores nas palavras reservadas do SQL direto no terminal
spring.jpa.properties.hibernate.highlight_sql=true